[modules]
left = [ "WindowTitle" ]
center = [ "Workspaces" ]
right = [ "SystemInfo", [ "Privacy", "Settings", "Tempo" ] ]

# ashell 0.9.0 replaced the "Clock" module with "Tempo" (clock + optional weather).
# Omitting weather_location renders a plain clock with no network calls.
[tempo]
clock_format = "%a %b %d %I:%M %p"
